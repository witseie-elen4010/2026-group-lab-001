name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      MONGODB_URI: ${{ secrets.MONGODB_URI }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Note Atlas test mode
        run: |
          if [ -z "$MONGODB_URI" ]; then
            echo "MONGODB_URI secret is not set. Atlas integration tests will be skipped."
            echo "MONGODB_URI secret is not set. Atlas integration tests will be skipped." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "MONGODB_URI secret detected. Atlas integration tests will run."
            echo "MONGODB_URI secret detected. Atlas integration tests will run." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Run StandardJS
        run: npm run lint

      - name: Run test suite
        run: npm test -- --runInBand

      - name: Publish coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: coverage/lcov.info
          format: lcov

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore